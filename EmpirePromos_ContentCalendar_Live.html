<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empire Promos — Content Calendar May 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#1a3767; --navy-dark:#0f2147; --navy-mid:#1e4080; --navy-light:#2a4d8f;
  --orange:#ec7626; --orange-lt:#f59347;
  --blue:#01aeef; --green:#648d3d;
  --white:#ffffff; --bg:#f0f3f8; --surface:#ffffff;
  --border:#dde3ef; --border-dark:#c8d0e4;
  --text:#1a2540; --muted:#6b7a99; --light:#9aa3bb;

  --w1-bg:#ffffff; --w2-bg:#f5f7fb; --w3-bg:#ffffff; --w4-bg:#f5f7fb; --w5-bg:#ffffff;

  --ps-bg:#ddeeff; --ps-fg:#1a3767;
  --bts-bg:#fff0e0; --bts-fg:#a04800;
  --fe-bg:#e8f5e9; --fe-fg:#2e7d32;
  --edu-bg:#f3e8ff; --edu-fg:#6a0dad;
  --cs-bg:#fff9e0; --cs-fg:#7a5c00;
  --st-bg:#ffe8ea; --st-fg:#b71c1c;
  --tbd-bg:#eeeeee; --tbd-fg:#666666;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;}

/* ── HEADER ─────────────────────────────────────────── */
.hdr{
  position:sticky;top:0;z-index:200;
  background:var(--navy-dark);
  border-bottom:3px solid var(--orange);
  display:flex;align-items:center;gap:16px;
  padding:0 20px;height:52px;
}
.hdr-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#fff;white-space:nowrap;}
.hdr-logo span{color:var(--orange);}
.hdr-pipe{width:1px;height:20px;background:rgba(255,255,255,.2);}
.hdr-sub{font-size:11px;font-weight:500;color:#7a99cc;text-transform:uppercase;letter-spacing:.6px;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.sync-badge{
  display:flex;align-items:center;gap:5px;
  font-family:'DM Mono',monospace;font-size:10px;color:#7a99cc;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  padding:4px 10px;border-radius:20px;
}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4caf50;transition:background .3s;}
.sync-dot.syncing{background:var(--orange);animation:pulse 1s infinite;}
.sync-dot.error{background:#f44336;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.btn{border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;padding:7px 14px;transition:all .15s;}
.btn-orange{background:var(--orange);color:#fff;}
.btn-orange:hover{background:var(--orange-lt);}
.btn-navy{background:var(--navy);color:#fff;}
.btn-navy:hover{background:var(--navy-light);}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border);}
.btn-ghost:hover{border-color:var(--navy);color:var(--navy);}

/* ── STATS BAR ──────────────────────────────────────── */
.stats-bar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:7px 20px;display:flex;align-items:center;gap:16px;overflow-x:auto;
}
.stat{display:flex;align-items:center;gap:6px;white-space:nowrap;}
.stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.stat-lbl{font-size:11px;color:var(--muted);}
.stat-num{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--text);}
.sdiv{width:1px;height:16px;background:var(--border);}

/* ── TOOLBAR ────────────────────────────────────────── */
.toolbar{
  position:sticky;top:52px;z-index:190;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:8px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.tb-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--light);margin-right:2px;}
.chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:20px;
  border:1.5px solid var(--border);background:var(--bg);
  font-size:11px;font-weight:500;color:var(--muted);
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.chip:hover{border-color:var(--navy);color:var(--navy);}
.chip.on{background:var(--navy);border-color:var(--navy);color:#fff;}
.chip.on.org{background:var(--orange);border-color:var(--orange);}
.tdiv{width:1px;height:18px;background:var(--border);margin:0 2px;}
.search-wrap{
  margin-left:auto;display:flex;align-items:center;gap:6px;
  background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:4px 12px;
}
.search-wrap input{border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);outline:none;width:150px;}
.search-wrap input::placeholder{color:var(--light);}

/* ── MAIN LAYOUT ────────────────────────────────────── */
.main{display:flex;height:calc(100vh - 52px - 38px - 44px);overflow:hidden;}
.table-pane{flex:1;overflow:auto;}

/* ── TABLE ──────────────────────────────────────────── */
.tbl-wrap{min-width:1500px;}
table{width:100%;border-collapse:collapse;}
thead th{
  position:sticky;top:0;z-index:100;
  background:#e8ecf5;padding:8px 10px;
  text-align:left;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.6px;color:var(--muted);
  border-bottom:2px solid var(--border-dark);border-right:1px solid var(--border);
  white-space:nowrap;
}
thead th:last-child{border-right:none;}
td{
  padding:8px 10px;border-bottom:1px solid var(--border);
  border-right:1px solid var(--border);vertical-align:top;line-height:1.45;
}
td:last-child{border-right:none;}
tr.data-row{cursor:pointer;transition:filter .1s;}
tr.data-row:hover td{filter:brightness(.97);}
tr.data-row.selected td{outline:2px solid var(--orange);outline-offset:-1px;}

/* Week color banding */
tr.w1 td{background:#ffffff;}
tr.w2 td{background:#f5f7fb;}
tr.w3 td{background:#ffffff;}
tr.w4 td{background:#f5f7fb;}
tr.w5 td{background:#ffffff;}
tr.data-row:hover.w1 td,tr.data-row:hover.w3 td,tr.data-row:hover.w5 td{background:#f0f4ff;}
tr.data-row:hover.w2 td,tr.data-row:hover.w4 td{background:#ebeef7;}

/* Week header row */
tr.week-hdr td{
  padding:0;background:none!important;border-bottom:none;
}
.week-hdr-inner{
  display:flex;align-items:center;gap:12px;
  padding:7px 20px;
  border-left:4px solid var(--orange);
  background:var(--navy);
}
.wh-label{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1.5px;color:#fff;}
.wh-dates{font-size:11px;color:#7a99cc;font-weight:500;}
.wh-count{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;color:#7a99cc;background:rgba(255,255,255,.08);padding:2px 8px;border-radius:10px;}

/* Col widths */
.c-date{width:100px;min-width:100px;}
.c-theme{width:110px;min-width:110px;}
.c-tags{width:140px;min-width:140px;}
.c-plat{width:130px;min-width:130px;}
.c-pillar{width:130px;min-width:130px;}
.c-format{width:130px;min-width:130px;}
.c-hook{width:200px;min-width:200px;}
.c-cap{width:260px;min-width:260px;}
.c-hash{width:180px;min-width:180px;}
.c-cta{width:120px;min-width:120px;}
.c-visual{width:160px;min-width:160px;}
.c-notes{width:160px;min-width:160px;}
.c-status{width:100px;min-width:100px;}

/* Cell styles */
.cd{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:var(--navy);line-height:1.7;}
.cd .wk{font-size:9px;color:var(--light);}
.cth{font-size:11px;font-weight:600;color:var(--navy);font-style:italic;}
.tags-cell{display:flex;flex-wrap:wrap;gap:3px;}
.tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;}
.tag0{background:var(--navy);color:#fff;}
.tag1{background:var(--navy-light);color:#fff;}
.tag2{background:var(--blue);color:#fff;}
.tag-tbd{background:#aaa;color:#fff;}
.plat-cell{display:flex;align-items:flex-start;gap:5px;font-size:11px;font-weight:700;color:var(--navy);}
.pi{font-size:13px;line-height:1.3;}
.pillar-badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;}
.fmt-cell{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.hook-cell{font-size:11px;font-weight:600;color:var(--text);line-height:1.5;}
.cap-cell{font-size:11px;color:var(--text);line-height:1.55;max-height:64px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;}
.hash-cell{font-size:10px;color:var(--blue);font-family:'DM Mono',monospace;line-height:1.7;word-break:break-all;}
.cta-cell{font-size:11px;color:var(--orange);font-weight:600;line-height:1.5;}
.notes-cell{font-size:11px;color:var(--muted);font-style:italic;line-height:1.5;max-height:56px;overflow:hidden;}
.status-badge{display:inline-block;padding:3px 9px;border-radius:12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;}

/* ── EDIT DRAWER ────────────────────────────────────── */
.drawer{
  width:0;overflow:hidden;
  background:var(--surface);
  border-left:1px solid var(--border);
  transition:width .25s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  flex-shrink:0;
}
.drawer.open{width:420px;}
.drawer-hdr{
  background:var(--navy);
  padding:14px 16px;
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
}
.drawer-hdr h3{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;color:#fff;flex:1;}
.drawer-close{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;opacity:.7;line-height:1;}
.drawer-close:hover{opacity:1;}
.drawer-body{flex:1;overflow-y:auto;padding:16px;}
.drawer-section{margin-bottom:20px;}
.drawer-section-title{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  color:var(--muted);margin-bottom:10px;padding-bottom:6px;
  border-bottom:1px solid var(--border);
}
.drow{margin-bottom:12px;}
.drow label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:4px;}
.drow input,.drow select,.drow textarea{
  width:100%;border:1.5px solid var(--border);border-radius:6px;
  padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);
  outline:none;transition:border-color .15s;background:var(--bg);
}
.drow input:focus,.drow select:focus,.drow textarea:focus{border-color:var(--navy);background:#fff;}
.drow textarea{resize:vertical;min-height:80px;line-height:1.5;}
.drow-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.drawer-footer{
  flex-shrink:0;padding:12px 16px;
  border-top:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  background:var(--surface);
}
.btn-delete{background:none;border:1.5px solid #ffcdd2;color:#c62828;border-radius:6px;padding:7px 12px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-delete:hover{background:#ffebee;border-color:#c62828;}
.save-indicator{font-size:10px;color:#4caf50;font-weight:600;opacity:0;transition:opacity .3s;}
.save-indicator.show{opacity:1;}

/* ── ADD POST MODAL ─────────────────────────────────── */
.overlay{display:none;position:fixed;inset:0;background:rgba(10,20,50,.55);z-index:300;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:#fff;border-radius:12px;width:620px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.25);}
.modal-hdr{background:var(--navy);padding:15px 20px;border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:space-between;}
.modal-hdr h3{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:#fff;}
.modal-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;opacity:.7;}
.modal-close:hover{opacity:1;}
.modal-body{padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-body .full{grid-column:1/-1;}
.fg label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px;}
.fg input,.fg select,.fg textarea{width:100%;border:1.5px solid var(--border);border-radius:6px;padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);outline:none;transition:border-color .15s;background:var(--bg);}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--navy);background:#fff;}
.fg textarea{resize:vertical;min-height:70px;}
.modal-ftr{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}

/* ── TOAST ──────────────────────────────────────────── */
.toast{
  position:fixed;bottom:20px;right:20px;z-index:999;
  background:var(--navy-dark);color:#fff;
  padding:10px 16px;border-radius:8px;font-size:12px;font-weight:500;
  display:flex;align-items:center;gap:8px;
  opacity:0;transform:translateY(8px);
  transition:opacity .25s,transform .25s;pointer-events:none;
}
.toast.show{opacity:1;transform:translateY(0);}
.toast .dot{width:6px;height:6px;border-radius:50%;background:#4caf50;flex-shrink:0;}
.toast.err .dot{background:#f44336;}

/* ── LOADING ────────────────────────────────────────── */
.loader{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:300px;gap:14px;
}
.loader-ring{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-text{font-size:12px;color:var(--muted);}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-logo">EMPIRE<span>PROMOS</span></div>
  <div class="hdr-pipe"></div>
  <div class="hdr-sub">May 2026 — Content Calendar</div>
  <div class="hdr-right">
    <div class="sync-badge">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Connected</span>
    </div>
    <button class="btn btn-orange" onclick="openAddModal()">+ Add Post</button>
  </div>
</div>

<!-- STATS BAR -->
<div class="stats-bar" id="statsBar"></div>

<!-- TOOLBAR -->
<div class="toolbar">
  <span class="tb-lbl">Platform</span>
  <div class="chip on" data-f="platform" data-v="all" onclick="setFilter('platform','all',this)">All</div>
  <div class="chip" data-f="platform" data-v="Instagram + TikTok" onclick="setFilter('platform','Instagram + TikTok',this)">📱 IG + TikTok</div>
  <div class="chip" data-f="platform" data-v="Facebook" onclick="setFilter('platform','Facebook',this)">👥 Facebook</div>
  <div class="chip" data-f="platform" data-v="LinkedIn" onclick="setFilter('platform','LinkedIn',this)">💼 LinkedIn</div>
  <div class="chip" data-f="platform" data-v="X/Twitter" onclick="setFilter('platform','X/Twitter',this)">𝕏 X/Twitter</div>
  <div class="tdiv"></div>
  <span class="tb-lbl">Status</span>
  <div class="chip on" data-f="status" data-v="all" onclick="setFilter('status','all',this)">All</div>
  <div class="chip" data-f="status" data-v="To Do" onclick="setFilter('status','To Do',this)">To Do</div>
  <div class="chip" data-f="status" data-v="In Progress" onclick="setFilter('status','In Progress',this)">In Progress</div>
  <div class="chip" data-f="status" data-v="Scheduled" onclick="setFilter('status','Scheduled',this)">Scheduled</div>
  <div class="chip" data-f="status" data-v="Posted" onclick="setFilter('status','Posted',this)">Posted</div>
  <div class="chip" data-f="status" data-v="TBD" onclick="setFilter('status','TBD',this)">TBD</div>
  <div class="tdiv"></div>
  <span class="tb-lbl">Pillar</span>
  <div class="chip on" data-f="pillar" data-v="all" onclick="setFilter('pillar','all',this)">All</div>
  <div class="chip" data-f="pillar" data-v="Product Showcase" onclick="setFilter('pillar','Product Showcase',this)">Product</div>
  <div class="chip" data-f="pillar" data-v="Behind the Scenes" onclick="setFilter('pillar','Behind the Scenes',this)">BTS</div>
  <div class="chip" data-f="pillar" data-v="Fun & Engagement" onclick="setFilter('pillar','Fun & Engagement',this)">Engagement</div>
  <div class="chip" data-f="pillar" data-v="Education" onclick="setFilter('pillar','Education',this)">Education</div>
  <div class="chip" data-f="pillar" data-v="Client Spotlight" onclick="setFilter('pillar','Client Spotlight',this)">Client</div>
  <div class="chip" data-f="pillar" data-v="Seasonal & Timely" onclick="setFilter('pillar','Seasonal & Timely',this)">Seasonal</div>
  <div class="search-wrap">
    <svg width="11" height="11" fill="none" stroke="#9aa3bb" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" placeholder="Search posts..." oninput="doSearch(this.value)">
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="table-pane" id="tablePane">
    <div class="loader" id="loader">
      <div class="loader-ring"></div>
      <div class="loader-text">Loading calendar from Supabase...</div>
    </div>
    <div class="tbl-wrap" id="tblWrap" style="display:none"></div>
  </div>
  <!-- EDIT DRAWER -->
  <div class="drawer" id="drawer">
    <div class="drawer-hdr">
      <h3 id="drawerTitle">Edit Post</h3>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="drawer-footer">
      <button class="btn-delete" onclick="deletePost()">🗑 Delete Post</button>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="save-indicator" id="saveIndicator">✓ Saved</span>
        <button class="btn btn-ghost" onclick="closeDrawer()">Cancel</button>
        <button class="btn btn-orange" onclick="saveDrawer()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="overlay" id="addOverlay">
  <div class="modal">
    <div class="modal-hdr"><h3>ADD NEW POST</h3><button class="modal-close" onclick="closeAddModal()">✕</button></div>
    <div class="modal-body">
      <div class="fg"><label>Date</label><input id="m-date" placeholder="e.g. Fri, May 1"></div>
      <div class="fg"><label>Week</label><select id="m-week"><option>Week 1</option><option>Week 2</option><option>Week 3</option><option>Week 4</option><option>Week 5</option></select></div>
      <div class="fg"><label>Theme</label><input id="m-theme" placeholder="e.g. Summer Products"></div>
      <div class="fg"><label>Platform</label><select id="m-platform"><option>Instagram + TikTok</option><option>Facebook</option><option>LinkedIn</option><option>X/Twitter</option></select></div>
      <div class="fg"><label>Content Pillar</label><select id="m-pillar"><option>Product Showcase</option><option>Behind the Scenes</option><option>Fun & Engagement</option><option>Education</option><option>Client Spotlight</option><option>Seasonal & Timely</option><option>TBD</option></select></div>
      <div class="fg"><label>Status</label><select id="m-status"><option>To Do</option><option>In Progress</option><option>Scheduled</option><option>Posted</option><option>TBD</option></select></div>
      <div class="fg full"><label>Topic Tags (comma-separated, max 3)</label><input id="m-tags" placeholder="e.g. Summer, Sunglasses, Events"></div>
      <div class="fg full"><label>Format</label><input id="m-format" placeholder="e.g. IG: Carousel  |  TT: Video"></div>
      <div class="fg full"><label>Caption Hook</label><input id="m-hook" placeholder="The opening line..."></div>
      <div class="fg full"><label>Full Caption</label><textarea id="m-caption"></textarea></div>
      <div class="fg full"><label>Hashtags</label><input id="m-hashtags" placeholder="#EmpirePromotionalProducts ..."></div>
      <div class="fg full"><label>CTA</label><input id="m-cta" placeholder="e.g. EmpirePromos.com"></div>
      <div class="fg full"><label>Visual Direction</label><textarea id="m-visual"></textarea></div>
      <div class="fg full"><label>Copy Notes</label><textarea id="m-notes"></textarea></div>
    </div>
    <div class="modal-ftr">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-orange" onclick="submitAdd()">Add Post</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><div class="dot"></div><span id="toastMsg">Saved</span></div>

<script>

// ── SUPABASE API ──────────────────────────────────────────────
const hdrs = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

async function sbFetch(path, opts={}) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, { headers: hdrs, ...opts });
  if (!r.ok) { const t = await r.text(); throw new Error(t); }
  return r.status === 204 ? null : r.json();
}

async function loadPosts() {
  setSyncState('syncing','Loading...');
  try {
    const data = await sbFetch(`${TABLE}?select=*&order=id.asc`);
    if (!data || data.length === 0) {
      await seedData();
    } else {
      posts = data.map(normalizePost);
    }
    setSyncState('ok','Synced');
    render();
  } catch(e) {
    setSyncState('error','Offline');
    showToast('Could not connect to Supabase. Check table setup.', true);
    posts = DEFAULT_POSTS.map(normalizePost);
    render();
  }
  document.getElementById('loader').style.display='none';
  document.getElementById('tblWrap').style.display='block';
}

function normalizePost(p) {
  return {
    ...p,
    tags: Array.isArray(p.tags) ? p.tags : (typeof p.tags === 'string' ? JSON.parse(p.tags||'[]') : [])
  };
}

async function seedData() {
  showToast('First run — seeding calendar data...');
  setSyncState('syncing','Seeding...');
  try {
    const rows = DEFAULT_POSTS.map(p => ({ ...p, tags: JSON.stringify(p.tags) }));
    // Insert in batches of 10
    for (let i = 0; i < rows.length; i += 10) {
      await sbFetch(TABLE, { method:'POST', body: JSON.stringify(rows.slice(i, i+10)) });
    }
    const data = await sbFetch(`${TABLE}?select=*&order=id.asc`);
    posts = data.map(normalizePost);
    setSyncState('ok','Synced');
    showToast('Calendar loaded successfully ✓');
  } catch(e) {
    setSyncState('error','Seed failed');
    posts = DEFAULT_POSTS.map(normalizePost);
    showToast('Seeding failed — running in offline mode', true);
  }
}

async function updatePost(id, fields) {
  setSyncState('syncing','Saving...');
  try {
    await sbFetch(`${TABLE}?id=eq.${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ ...fields, updated_at: new Date().toISOString() })
    });
    const idx = posts.findIndex(p => p.id === id);
    if (idx > -1) Object.assign(posts[idx], fields);
    setSyncState('ok','Saved ✓');
    showToast('Changes saved to Supabase ✓');
    document.getElementById('saveIndicator').classList.add('show');
    setTimeout(() => document.getElementById('saveIndicator').classList.remove('show'), 2500);
  } catch(e) {
    setSyncState('error','Save failed');
    showToast('Save failed — check connection', true);
  }
}

async function insertPost(p) {
  setSyncState('syncing','Saving...');
  try {
    const row = { ...p, tags: JSON.stringify(p.tags) };
    const result = await sbFetch(TABLE, { method:'POST', body: JSON.stringify(row) });
    const inserted = Array.isArray(result) ? result[0] : result;
    posts.push(normalizePost(inserted || p));
    sortPosts();
    setSyncState('ok','Saved ✓');
    showToast('New post added ✓');
    render();
  } catch(e) {
    setSyncState('error','Insert failed');
    showToast('Insert failed — check connection', true);
  }
}

async function removePost(id) {
  setSyncState('syncing','Deleting...');
  try {
    await sbFetch(`${TABLE}?id=eq.${id}`, { method:'DELETE' });
    posts = posts.filter(p => p.id !== id);
    setSyncState('ok','Deleted ✓');
    showToast('Post deleted');
    closeDrawer();
    render();
  } catch(e) {
    setSyncState('error','Delete failed');
    showToast('Delete failed', true);
  }
}

function pillarBadge(p) {
  const s = PILLAR_STYLE[p] || PILLAR_STYLE['TBD'];
  return `<span class="pillar-badge" style="background:${s.bg};color:${s.fg}">${p}</span>`;
}
function statusBadge(s) {
  const st = STATUS_STYLE[s] || STATUS_STYLE['TBD'];
  return `<span class="status-badge" style="background:${st.bg};color:${st.fg}">${s}</span>`;
}
function tagHtml(tags) {
  if (!tags || !tags.length) return '<span class="tag tag-tbd">TBD</span>';
  return (tags||[]).slice(0,3).map((t,i) => `<span class="tag tag${i}">${t}</span>`).join('');
}
function e(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── FILTER & SEARCH ───────────────────────────────────────────
function setFilter(type, val, el) {
  filters[type] = val;
  document.querySelectorAll(`[data-f="${type}"]`).forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  render();
}
function doSearch(val) { search = val.toLowerCase(); render(); }

function visible() {
  return posts.filter(p => {
    if (filters.platform !== 'all' && p.platform !== filters.platform) return false;
    if (filters.status !== 'all' && p.status !== filters.status) return false;
    if (filters.pillar !== 'all' && p.pillar !== filters.pillar) return false;
    if (search) {
      const hay = [p.date,p.week,p.theme,(p.tags||[]).join(' '),p.platform,p.pillar,p.hook,p.caption,p.hashtags].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

// ── RENDER ────────────────────────────────────────────────────
function renderStats() {
  const vis = visible();
  const bySt = {};
  vis.forEach(p => { bySt[p.status] = (bySt[p.status]||0)+1; });
  const items = [
    { lbl:'Showing', num:vis.length, color:'#1a3767' },
    { lbl:'Total', num:posts.length, color:'#9aa3bb' },
    'div',
    ...Object.entries(STATUS_STYLE).map(([s,st]) => ({ lbl:s, num:bySt[s]||0, color:st.fg }))
  ];
  document.getElementById('statsBar').innerHTML = items.map(it =>
    it==='div' ? '<div class="sdiv"></div>' :
    `<div class="stat"><div class="stat-dot" style="background:${it.color}"></div><span class="stat-lbl">${it.lbl}</span><span class="stat-num">${it.num}</span></div>`
  ).join('');
}

    wp.forEach(p => {

        <td class="c-pillar">${pillarBadge(p.pillar)}</td>

        <td class="c-hook"><div class="hook-cell">${e(p.hook)}</div></td>

function saveDrawer() {
  if (!drawerPost) return;
  const tagsRaw = document.getElementById('d-tags').value.split(',').map(t=>t.trim()).filter(Boolean).slice(0,3);
  const fields = {
    date:      document.getElementById('d-date').value.trim(),
    week:      document.getElementById('d-week').value,
    theme:     document.getElementById('d-theme').value.trim(),
    platform:  document.getElementById('d-platform').value,
    status:    document.getElementById('d-status').value,
    pillar:    document.getElementById('d-pillar').value,
    tags:      tagsRaw,
    format:    document.getElementById('d-format').value.trim(),
    hook:      document.getElementById('d-hook').value.trim(),
    caption:   document.getElementById('d-caption').value.trim(),
    hashtags:  document.getElementById('d-hashtags').value.trim(),
    cta:       document.getElementById('d-cta').value.trim(),
    visual:    document.getElementById('d-visual').value.trim(),
    notes:     document.getElementById('d-notes').value.trim(),
  };
  updatePost(drawerPost.id, fields);
  Object.assign(drawerPost, fields);
  document.getElementById('drawerTitle').textContent = `Edit — ${fields.date}`;
  render();
}

function deletePost() {
  if (!drawerPost) return;
  if (!confirm(`Delete this post?\n"${drawerPost.hook}"\n\nThis cannot be undone.`)) return;
  removePost(drawerPost.id);
}

// ── UTILS ─────────────────────────────────────────────────────
function sortPosts() {
  const wo = ['Week 1','Week 2','Week 3','Week 4','Week 5'];
  posts.sort((a,b) => wo.indexOf(a.week) - wo.indexOf(b.week) || a.id - b.id);
}

function setSyncState(state, label) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot' + (state==='syncing' ? ' syncing' : state==='error' ? ' error' : '');
  lbl.textContent = label;
}

let toastTimer;
function showToast(msg, isErr=false) {
  const t = document.getElementById('toast');
  const m = document.getElementById('toastMsg');
  m.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

  {id:9,date:"Wed, May 7",week:"Week 2",theme:"Cost Per Impression",tags:["ROI","Stats","Pens"],platform:"Instagram + TikTok",pillar:"Education",format:"IG: Stat Graphic  |  TT: Guess the Brand",hook:"Your logo on a pen costs less than a click.  //  Guess the brand before we reveal it 👀",caption:"IG: The average cost per impression on a branded promotional product is $0.002. Less than almost any digital ad format — and it sticks around for months. EmpirePromos.com\n\nTT: Can you figure it out from the merch alone? Drop your guess ⬇️",hashtags:"#EmpirePromotionalProducts #MarketingROI #BrandedMerch #BrandAwareness #GuessTheBrand",cta:"IG: EmpirePromos.com  |  TT: Drop your guess",visual:"IG: Bold '$0.002' stat graphic. Navy bg, orange text.\nTT: Branded product close-up — no logo visible. Reveal at the end.",notes:"IG is educational; TT is engagement-first.",status:"To Do"},

  {id:18,date:"Tue, May 12",week:"Week 3",theme:"Onboarding Kits",tags:["Onboarding","HR","Retention"],platform:"LinkedIn",pillar:"Client Spotlight",format:"Decision-Maker Post",hook:"The first day of employment is the highest-stakes brand touchpoint most companies overlook.",caption:"A new hire's first day shapes their perception of your company for months.\n\nThe ROI case:\n— Employees who feel valued from day one are 2x more likely to stay past year one\n— A physical, branded kit communicates culture before a single meeting\n— Consistent kitting across locations ensures every hire gets the same experience\n\nEmpire Promos designs, assembles, and ships custom onboarding kits on behalf of HR and ops teams. No inventory. No logistics overhead.\n\nEmpirePromos.com",hashtags:"#EmpirePromotionalProducts #EmployeeOnboarding #HRLeaders #TalentRetention #KittingAndFulfillment",cta:"EmpirePromos.com",visual:"Clean onboarding kit flat lay — apparel, drinkware, notebook, branded packaging.",notes:"Target: CHROs, HR Directors, People Ops leaders.",status:"To Do"},

  {id:25,date:"Fri, May 15",week:"Week 3",theme:"Graduation Revenue",tags:["Graduation","Nonprofits","Revenue"],platform:"LinkedIn",pillar:"Seasonal & Timely",format:"Decision-Maker Post",hook:"Graduation season represents a significant — and often underutilized — revenue opportunity.",caption:"Every graduation is a brand moment with a captive, emotionally engaged audience.\n\nOrganizations capitalizing on it:\n— Print-on-demand storefronts selling branded apparel to students, alumni, and families\n— Zero-inventory fundraising programs tied to graduation merchandise\n— Staff appreciation kits for faculty and administration\n— Brand equity with graduates who become long-term donors\n\nEmpire Promos builds merchandise programs that generate revenue, not just cost.\n\nNo minimums. No middleman.\n\nEmpirePromos.com",hashtags:"#EmpirePromotionalProducts #GraduationSeason #NonprofitLeaders #EducationLeaders #FundraisingSolutions #PrintOnDemand",cta:"EmpirePromos.com",visual:"Professional product image — branded grad merchandise or POD storefront mockup.",notes:"Target: School Superintendents, Nonprofit EDs, University marketing directors.",status:"To Do"},

  {id:29,date:"Tue, May 19",week:"Week 4",theme:"Kitting Cost Savings",tags:["Kitting","Operations","Cost"],platform:"LinkedIn",pillar:"Product Showcase",format:"Decision-Maker Post",hook:"Kitting and fulfillment is one of the highest-value, lowest-visibility services in branded merchandise.",caption:"Most companies are unknowingly absorbing the cost of kitting in-house.\n\nHidden expenses:\n— Staff time sourcing, receiving, and organizing products\n— Assembly labor for custom kits\n— Storage space for pre-built kits\n— Shipping coordination across multiple vendors\n\nWith Empire Promos:\n— You approve the kit design\n— We source, assemble, quality-check, and ship on your behalf\n— Individual or bulk ship to any address, on your timeline\n\nEmpirePromos.com",hashtags:"#EmpirePromotionalProducts #KittingAndFulfillment #SupplyChain #OperationalEfficiency #ProcurementLeaders",cta:"EmpirePromos.com",visual:"Clean kitting operation photo or finished kit flat lay.",notes:"Target: COOs, Procurement Directors, Operations VPs.",status:"To Do"},
  {id:30,date:"Wed, May 20",week:"Week 4",theme:"Best Merch Question",tags:["Engagement","Question","Community"],platform:"LinkedIn",pillar:"Fun & Engagement",format:"Decision-Maker Post",hook:"What's the best branded merchandise your company has ever given out?",caption:"The answers are always revealing.\n\nThe best ones are never the cheapest. They're the ones that were thoughtful — the right product for the right audience at the right moment.\n\nA software company that gave custom AirPod cases at their user conference. A financial services firm that sent leather card holders to new clients. A gym chain that gave branded gym bags to every new member.\n\nWhat do they have in common? The merchandise reinforced the brand promise.\n\nThat's the standard Empire Promos helps you hit.\n\nDrop your answer below.\n\nEmpirePromos.com",hashtags:"#EmpirePromotionalProducts #BrandedMerchandise #MarketingStrategy #B2BMarketing",cta:"Drop your answer below",visual:"Simple branded product image or text-only post.",notes:"Engagement framed as thought leadership.",status:"To Do"},

  {id:34,date:"Fri, May 22",week:"Week 4",theme:"Memorial Day Events",tags:["Memorial Day","Events","Summer"],platform:"Facebook",pillar:"Seasonal & Timely",format:"Single Image",hook:"Memorial Day weekend is almost here — is your brand ready for summer?",caption:"Whether you're gearing up for outdoor events, company outings, or summer trade shows — Empire Promos has the branded merchandise to match. Custom sunglasses, hats, koozies, lip balm, and more. No minimums. Fast turnaround. EmpirePromos.com",hashtags:"#EmpirePromotionalProducts #MemorialDay #SummerMerch #CustomSunglasses",cta:"EmpirePromos.com",visual:"Summer product flat lay — sunglasses, hat, koozie, lip balm.",notes:"Facebook B2B — frame around events and outings.",status:"To Do"},
  {id:35,date:"Fri, May 22",week:"Week 4",theme:"Memorial Day Q3 Planning",tags:["Memorial Day","Q3","Planning"],platform:"LinkedIn",pillar:"Seasonal & Timely",format:"Decision-Maker Post",hook:"Memorial Day marks the start of Q3 planning season. Plan now or pay rush premiums later.",caption:"The businesses that get the best results from summer branded merchandise plan before the season hits.\n\nWhy it matters:\n— Lead times on custom products increase significantly in peak season\n— Last-minute orders mean paying rush premiums or accepting lower quality\n— Event merchandise requires time for proofing, production, and delivery\n\nSmart Q3 planning:\n— Lock in apparel programs for company events now\n— Source custom outdoor merchandise before the summer spike\n— Build or refresh your company store ahead of onboarding season\n\nEmpirePromos.com",hashtags:"#EmpirePromotionalProducts #MemorialDay #Q3Planning #CorporateEvents #ProcurementLeaders #BrandedMerchandise",cta:"EmpirePromos.com",visual:"Professional outdoor event or product image.",notes:"Target: Marketing Directors, Procurement VPs, Event Planners.",status:"To Do"},

  {id:40,date:"Tue, May 26",week:"Week 5",theme:"Brand Strategy",tags:["Brand Strategy","Q3","Investment"],platform:"LinkedIn",pillar:"Seasonal & Timely",format:"Decision-Maker Post",hook:"The companies outperforming on brand visibility this summer treat branded merchandise as a strategic channel — not a line item to minimize.",caption:"Q3 is the highest-opportunity season for brand impressions through physical merchandise.\n\nThe strategic difference between companies that capture this and those that don't:\n— Proactive planning vs. reactive ordering\n— A vendor with direct manufacturing vs. a distributor markup chain\n— A scalable program vs. one-off orders\n\nEmpire Promos partners with marketing and procurement leaders to build Q3 merchandise programs that drive real brand ROI.\n\nEmpirePromos.com",hashtags:"#EmpirePromotionalProducts #BrandStrategy #Q3Marketing #BrandedMerchandise #MarketingROI #CMO",cta:"EmpirePromos.com",visual:"Clean seasonal graphic or professional outdoor/event product image.",notes:"Target: CMOs, Marketing Directors, Brand Managers.",status:"To Do"},

  {id:42,date:"Wed, May 27",week:"Week 5",theme:"Middleman Problem",tags:["No Middleman","Pricing","Supply Chain"],platform:"LinkedIn",pillar:"Education",format:"Decision-Maker Post",hook:"The promotional products industry has a middleman problem. Most businesses are paying for it without knowing it.",caption:"Traditional supply chain:\nYour company → Distributor (markup) → Decorator (markup) → Manufacturer\n\nEach layer adds margin. You've paid 40–60% above true cost of goods.\n\nEmpire Promos:\nYour company → Empire Promos → Manufacturer\n\nNo distributor. No middleman. Direct-to-brand pricing.\n\nA company spending $50,000 annually on branded merchandise is likely paying $20,000–$30,000 in distributor markup they don't see on any invoice.\n\nEmpirePromos.com",hashtags:"#EmpirePromotionalProducts #ProcurementLeaders #SupplyChain #BrandedMerchandise #CostReduction #DirectPricing",cta:"EmpirePromos.com",visual:"Clean infographic — traditional supply chain vs. Empire Promos model.",notes:"Target: CPOs, Procurement Directors, CFOs. The $20-30K number makes it tangible.",status:"To Do"},
