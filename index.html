<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Empire Promo & Greek Empire — Marketing Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg-secondary: #f7f7f5;
    --text: #1a1a1a; --text-secondary: #6b6b6b; --text-tertiary: #aaaaaa;
    --border: rgba(0,0,0,0.12); --border-strong: rgba(0,0,0,0.22);
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#1c1c1c; --bg-secondary:#252525; --text:#f0f0f0; --text-secondary:#999; --text-tertiary:#666; --border:rgba(255,255,255,0.1); --border-strong:rgba(255,255,255,0.2); }
    .pill-select.pri-high   { background:#501313; color:#F7C1C1; border-color:#A32D2D; }
    .pill-select.pri-medium { background:#412402; color:#FAC775; border-color:#854F0B; }
    .pill-select.pri-low    { background:#173404; color:#C0DD97; border-color:#3B6D11; }
    .pill-select.sta-in-progress { background:#042C53; color:#85B7EB; border-color:#185FA5; }
    .pill-select.sta-complete    { background:#173404; color:#C0DD97; border-color:#3B6D11; }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .wrap { max-width: 800px; margin: 0 auto; }
  .header { margin-bottom: 2rem; }
  .header h1 { font-size: 22px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .header p { font-size: 14px; color: var(--text-secondary); margin-top: 5px; }
  .sync-status { font-size: 11px; margin-top: 4px; }
  .sync-status.syncing { color: #854F0B; }
  .sync-status.synced  { color: #3B6D11; }
  .sync-status.error   { color: #A32D2D; }
  .progress-section { margin-bottom: 1.5rem; }
  .progress-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--text); border-radius: 99px; transition: width 0.3s ease; }
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .tab { padding: 5px 14px; font-size: 13px; border: 0.5px solid var(--border-strong); border-radius: 99px; background: transparent; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .tab:hover { background: var(--bg-secondary); }
  .tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin: 1.25rem 0 8px; }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-tertiary); }
  .add-task-btn { font-size: 12px; color: var(--text-tertiary); background: none; border: 0.5px solid var(--border-strong); border-radius: 99px; padding: 2px 10px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .add-task-btn:hover { color: var(--text); border-color: var(--text); background: var(--bg-secondary); }
  .add-task-form { background: var(--bg-secondary); border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 6px; display: flex; flex-direction: column; gap: 8px; }
  .add-task-form input, .add-task-form select { font-size: 13px; font-family: inherit; color: var(--text); background: var(--bg); border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 6px 10px; outline: none; }
  .add-task-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .add-task-row input[type=text]:first-child { flex: 1; min-width: 140px; }
  .add-task-actions { display: flex; gap: 6px; justify-content: flex-end; }
  .btn-cancel { background: none; border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 5px 12px; font-size: 13px; font-family: inherit; color: var(--text-secondary); cursor: pointer; }
  .btn-add { background: var(--text); color: var(--bg); border: none; border-radius: var(--radius); padding: 5px 14px; font-size: 13px; font-family: inherit; cursor: pointer; transition: opacity 0.15s; }
  .btn-add:hover { opacity: 0.8; }
  .task-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; overflow: hidden; transition: border-color 0.15s; }
  .task-card:hover { border-color: var(--border-strong); }
  .task-card.status-complete { opacity: 0.5; }
  .task-card.status-complete .task-name { text-decoration: line-through; color: var(--text-secondary); }
  .task-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; flex-wrap: wrap; }
  .task-name { font-size: 14px; color: var(--text); flex: 1; min-width: 120px; }
  .due-btn { font-size: 12px; color: var(--text-tertiary); white-space: nowrap; background: none; border: 0.5px solid transparent; border-radius: var(--radius); padding: 2px 6px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .due-btn:hover { border-color: var(--border-strong); color: var(--text-secondary); background: var(--bg-secondary); }
  .due-input { font-size: 12px; color: var(--text); background: var(--bg-secondary); border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 2px 6px; font-family: inherit; outline: none; width: 130px; }
  .pill-select { font-size: 11px; padding: 2px 7px; border-radius: 99px; font-weight: 500; white-space: nowrap; border: 0.5px solid; cursor: pointer; font-family: inherit; outline: none; appearance: none; -webkit-appearance: none; }
  .pill-select.pri-high   { background:#FCEBEB; color:#A32D2D; border-color:#F09595; }
  .pill-select.pri-medium { background:#FAEEDA; color:#854F0B; border-color:#FAC775; }
  .pill-select.pri-low    { background:#EAF3DE; color:#3B6D11; border-color:#C0DD97; }
  .pill-select.sta-not-started { background: var(--bg-secondary); color: var(--text-secondary); border-color: var(--border-strong); }
  .pill-select.sta-in-progress { background:#E6F1FB; color:#185FA5; border-color:#85B7EB; }
  .pill-select.sta-complete    { background:#EAF3DE; color:#3B6D11; border-color:#C0DD97; }
  .notes-btn { background: none; border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 3px 8px; font-size: 11px; color: var(--text-secondary); cursor: pointer; white-space: nowrap; font-family: inherit; transition: all 0.15s; flex-shrink: 0; }
  .notes-btn:hover { background: var(--bg-secondary); color: var(--text); }
  .notes-btn.has-note { color: var(--text); }
  .delete-btn { background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 18px; padding: 0 2px; line-height: 1; flex-shrink: 0; transition: color 0.15s; }
  .delete-btn:hover { color: #A32D2D; }
  .notes-panel { border-top: 0.5px solid var(--border); padding: 10px 12px; background: var(--bg-secondary); display: none; }
  .notes-panel.open { display: block; }
  .notes-panel textarea { width: 100%; font-size: 13px; font-family: inherit; color: var(--text); background: var(--bg); border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 8px 10px; resize: vertical; min-height: 60px; outline: none; line-height: 1.5; }
  .notes-panel textarea::placeholder { color: var(--text-tertiary); }
  .notes-footer { display: flex; justify-content: flex-end; margin-top: 6px; }
  .save-btn { background: var(--text); color: var(--bg); border: none; border-radius: var(--radius); padding: 5px 14px; font-size: 13px; font-family: inherit; cursor: pointer; }
  .empty { font-size: 14px; color: var(--text-tertiary); padding: 0.5rem 0; }
  .loading { font-size: 14px; color: var(--text-tertiary); padding: 2rem 0; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Empire Promo &amp; Greek Empire — Marketing Tracker</h1>
    <p>Mike &nbsp;·&nbsp; In progress</p>
    <div class="sync-status syncing" id="sync-status">Connecting...</div>
  </div>
  <div class="progress-section">
    <div class="progress-label">
      <span>Overall progress</span>
      <span id="progress-count">0 / 0 completed</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="setFilter(this,'all')">All</button>
    <button class="tab" onclick="setFilter(this,'not-started')">Not started</button>
    <button class="tab" onclick="setFilter(this,'in-progress')">In progress</button>
    <button class="tab" onclick="setFilter(this,'complete')">Complete</button>
    <button class="tab" onclick="setFilter(this,'high')">High</button>
    <button class="tab" onclick="setFilter(this,'medium')">Medium</button>
    <button class="tab" onclick="setFilter(this,'low')">Low</button>
    <button class="tab" onclick="setFilter(this,'empire_promo')">Empire Promo</button>
    <button class="tab" onclick="setFilter(this,'greek_empire')">Greek Empire</button>
    <button class="tab" onclick="setFilter(this,'martech')">MarTech</button>
    <button class="tab" onclick="resetAll()">Reset all</button>
  </div>
  <div id="task-list"><div class="loading">Loading tasks...</div></div>
</div>
<script>
const SUPABASE_URL = 'https://lbudlspmjobhmrrwpfhg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxidWRsc3Btam9iaG1ycndwZmhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDM0ODcsImV4cCI6MjA5MDYxOTQ4N30.rSzDOWpTIkugbUEkcXYL6c9BHnzOZujSl11TOH_0aF0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const DEFAULT_TASKS = [
  { id:1,  name:"Overview video",                       group_name:"empire_promo", priority:"high",   due:"Apr 7, 2026",  status:"not-started", note:"" },
  { id:2,  name:"Aggie set up",                          group_name:"empire_promo", priority:"medium", due:"Apr 10, 2026", status:"not-started", note:"" },
  { id:3,  name:"Thumbnails for website",                group_name:"greek_empire", priority:"medium", due:"Apr 8, 2026",  status:"not-started", note:"" },
  { id:4,  name:"Design studio",                         group_name:"greek_empire", priority:"high",   due:"Apr 9, 2026",  status:"not-started", note:"" },
  { id:5,  name:"Google Biz Profile",                    group_name:"greek_empire", priority:"high",   due:"Apr 5, 2026",  status:"not-started", note:"" },
  { id:6,  name:"Alt logos",                             group_name:"greek_empire", priority:"medium", due:"Apr 12, 2026", status:"not-started", note:"" },
  { id:7,  name:"Greek postcard mailer",                 group_name:"greek_empire", priority:"low",    due:"Apr 18, 2026", status:"not-started", note:"" },
  { id:8,  name:"Greek Empire box ideas",                group_name:"greek_empire", priority:"low",    due:"Apr 20, 2026", status:"not-started", note:"" },
  { id:9,  name:"Swag box for Greek Empire campus reps", group_name:"greek_empire", priority:"medium", due:"Apr 15, 2026", status:"not-started", note:"" },
  { id:10, name:"College Directory",                     group_name:"greek_empire", priority:"medium", due:"Apr 22, 2026", status:"not-started", note:"" },
  { id:11, name:"Mailchimp",                             group_name:"martech",      priority:"high",   due:"Apr 8, 2026",  status:"not-started", note:"" },
  { id:12, name:"PromoPulse",                            group_name:"martech",      priority:"medium", due:"Apr 14, 2026", status:"not-started", note:"" },
  { id:13, name:"Klaviyo",                               group_name:"martech",      priority:"medium", due:"Apr 16, 2026", status:"not-started", note:"" },
];
const groups = [{key:'empire_promo',label:'Empire Promo'},{key:'greek_empire',label:'Greek Empire'},{key:'martech',label:'MarTech'}];
let tasks=[],nextId=14,currentFilter='all',openNote=null,editingDue=null,addingTo=null;
function setSync(state,msg){const el=document.getElementById('sync-status');el.className='sync-status '+state;el.textContent=msg;}
async function loadTasks(){
  setSync('syncing','Loading...');
  const {data,error}=await sb.from('tasks').select('*').order('id');
  if(error){setSync('error','Connection error');tasks=JSON.parse(JSON.stringify(DEFAULT_TASKS));render();return;}
  if(!data||data.length===0){await sb.from('tasks').insert(DEFAULT_TASKS);tasks=JSON.parse(JSON.stringify(DEFAULT_TASKS));}
  else{
    tasks=data;
    for(const dt of DEFAULT_TASKS){if(!tasks.find(t=>t.id===dt.id)){await sb.from('tasks').insert(dt);tasks.push(dt);}}
    nextId=Math.max(...tasks.map(t=>t.id),13)+1;
  }
  setSync('synced','Live — changes sync for everyone');render();
}
async function updateTask(id,changes){
  setSync('syncing','Saving...');
  const t=tasks.find(t=>t.id===id);if(t)Object.assign(t,changes);
  const {error}=await sb.from('tasks').update({...changes,updated_at:new Date().toISOString()}).eq('id',id);
  if(error)setSync('error','Save failed');else setSync('synced','Saved — synced for everyone');
  render();
}
async function addTask(task){
  setSync('syncing','Adding...');
  const {data,error}=await sb.from('tasks').insert(task).select().single();
  if(error){setSync('error','Add failed');return;}
  tasks.push(data||task);setSync('synced','Added — synced for everyone');render();
}
async function removeTask(id){
  setSync('syncing','Removing...');
  tasks=tasks.filter(t=>t.id!==id);
  const {error}=await sb.from('tasks').delete().eq('id',id);
  if(error)setSync('error','Delete failed');else setSync('synced','Deleted — synced for everyone');
  render();
}
async function resetAll(){
  if(!confirm('Reset all to Not Started?'))return;
  tasks.forEach(t=>t.status='not-started');
  await sb.from('tasks').update({status:'not-started',updated_at:new Date().toISOString()}).gte('id',0);
  setSync('synced','Reset — synced for everyone');render();
}
function setPriority(id,val){updateTask(id,{priority:val});}
function setStatus(id,val){updateTask(id,{status:val});}
function deleteTask(id){if(confirm('Remove this task?'))removeTask(id);}
function toggleNote(id){openNote=openNote===id?null:id;render();if(openNote===id){setTimeout(()=>{const ta=document.getElementById('ta-'+id);if(ta)ta.focus();},50);}}
function saveNote(id){const ta=document.getElementById('ta-'+id);if(ta)updateTask(id,{note:ta.value});openNote=null;}
function setFilter(el,f){currentFilter=f;document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));el.classList.add('active');render();}
function startEditDue(id){editingDue=id;render();setTimeout(()=>{const inp=document.getElementById('due-input-'+id);if(inp){inp.focus();inp.select();}},50);}
function saveDue(id){const inp=document.getElementById('due-input-'+id);if(inp&&inp.value.trim())updateTask(id,{due:inp.value.trim()});editingDue=null;render();}
function handleDueKey(e,id){if(e.key==='Enter')saveDue(id);if(e.key==='Escape'){editingDue=null;render();}}
function showAddForm(group){addingTo=group;render();setTimeout(()=>{const inp=document.getElementById('new-task-name');if(inp)inp.focus();},50);}
function cancelAdd(){addingTo=null;render();}
function submitAdd(group){
  const n=document.getElementById('new-task-name'),d=document.getElementById('new-task-due'),p=document.getElementById('new-task-priority'),s=document.getElementById('new-task-status');
  const name=n?n.value.trim():'';if(!name)return;
  const task={id:nextId++,name,group_name:group,priority:p?p.value:'medium',due:d&&d.value?d.value:'TBD',status:s?s.value:'not-started',note:''};
  addingTo=null;addTask(task);
}
function handleAddKey(e,group){if(e.key==='Enter')submitAdd(group);if(e.key==='Escape')cancelAdd();}
function addFormHTML(group){return `<div class="add-task-form"><div class="add-task-row"><input type="text" id="new-task-name" placeholder="Task name..." onkeydown="handleAddKey(event,'${group}')" /><input type="text" id="new-task-due" placeholder="Due date" style="width:140px" onkeydown="handleAddKey(event,'${group}')" /><select id="new-task-priority" style="width:100px"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select><select id="new-task-status" style="width:130px"><option value="not-started" selected>Not started</option><option value="in-progress">In progress</option><option value="complete">Complete</option></select></div><div class="add-task-actions"><button class="btn-cancel" onclick="cancelAdd()">Cancel</button><button class="btn-add" onclick="submitAdd('${group}')">Add task</button></div></div>`;}
function taskHTML(t){
  const isOpen=openNote===t.id,hasNote=t.note&&t.note.trim().length>0,noteEscaped=(t.note||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'),isEditingDue=editingDue===t.id;
  const dueHTML=isEditingDue?`<input class="due-input" id="due-input-${t.id}" value="${t.due}" onclick="event.stopPropagation()" onblur="saveDue(${t.id})" onkeydown="handleDueKey(event,${t.id})" />`:`<button class="due-btn" onclick="event.stopPropagation();startEditDue(${t.id})">${t.due}</button>`;
  return `<div class="task-card status-${t.status}"><div class="task-row"><span class="task-name">${t.name}</span>${dueHTML}<select class="pill-select pri-${t.priority}" onchange="setPriority(${t.id},this.value)"><option value="high" ${t.priority==='high'?'selected':''}>High</option><option value="medium" ${t.priority==='medium'?'selected':''}>Medium</option><option value="low" ${t.priority==='low'?'selected':''}>Low</option></select><select class="pill-select sta-${t.status}" onchange="setStatus(${t.id},this.value)"><option value="not-started" ${t.status==='not-started'?'selected':''}>Not started</option><option value="in-progress" ${t.status==='in-progress'?'selected':''}>In progress</option><option value="complete" ${t.status==='complete'?'selected':''}>Complete</option></select><button class="notes-btn${hasNote?' has-note':''}" onclick="toggleNote(${t.id})">${isOpen?'Close':hasNote?'View note':'+ Note'}</button><button class="delete-btn" onclick="deleteTask(${t.id})">&times;</button></div><div class="notes-panel${isOpen?' open':''}"><textarea id="ta-${t.id}" placeholder="Add a note...">${noteEscaped}</textarea><div class="notes-footer"><button class="save-btn" onclick="saveNote(${t.id})">Save note</button></div></div></div>`;
}
function render(){
  const done=tasks.filter(t=>t.status==='complete').length;
  document.getElementById('progress-count').textContent=done+' / '+tasks.length+' completed';
  document.getElementById('progress-fill').style.width=tasks.length?Math.round(done/tasks.length*100)+'%':'0%';
  let filtered=tasks;
  if(currentFilter==='not-started')filtered=tasks.filter(t=>t.status==='not-started');
  else if(currentFilter==='in-progress')filtered=tasks.filter(t=>t.status==='in-progress');
  else if(currentFilter==='complete')filtered=tasks.filter(t=>t.status==='complete');
  else if(currentFilter==='high')filtered=tasks.filter(t=>t.priority==='high');
  else if(currentFilter==='medium')filtered=tasks.filter(t=>t.priority==='medium');
  else if(currentFilter==='low')filtered=tasks.filter(t=>t.priority==='low');
  else if(currentFilter==='empire_promo')filtered=tasks.filter(t=>t.group_name==='empire_promo');
  else if(currentFilter==='greek_empire')filtered=tasks.filter(t=>t.group_name==='greek_empire');
  else if(currentFilter==='martech')filtered=tasks.filter(t=>t.group_name==='martech');
  let html='';
  if(['all','empire_promo','greek_empire','martech'].includes(currentFilter)){
    const show=currentFilter==='all'?groups:groups.filter(g=>g.key===currentFilter);
    show.forEach(g=>{const items=filtered.filter(t=>t.group_name===g.key);html+=`<div class="section-header"><span class="section-title">${g.label}</span><button class="add-task-btn" onclick="showAddForm('${g.key}')">+ Add task</button></div>`;if(addingTo===g.key)html+=addFormHTML(g.key);if(items.length)items.forEach(t=>html+=taskHTML(t));else if(addingTo!==g.key)html+='<p class="empty">No tasks yet.</p>';});
  }else{if(!filtered.length)html='<p class="empty">No tasks here.</p>';else filtered.forEach(t=>html+=taskHTML(t));}
  document.getElementById('task-list').innerHTML=html;
}
loadTasks();
</script>
</body>
</html>.
